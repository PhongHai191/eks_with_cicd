apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: webapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      nodeSelector:
        role: app

      containers:
      - name: backend
        image: 529646246979.dkr.ecr.ap-southeast-2.amazonaws.com/webapp-backend:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          value: postgres

        - name: DB_USER
          value: postgres

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

        - name: DB_NAME
          value: webapp

        - name: REDIS_HOST
          value: redis
