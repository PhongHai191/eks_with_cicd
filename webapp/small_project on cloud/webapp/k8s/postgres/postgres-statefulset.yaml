apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: webapp

spec:
  serviceName: postgres
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      nodeSelector:
        role: data  

      containers:
      - name: postgres
        image: postgres:15

        ports:
        - containerPort: 5432

        env:
        - name: POSTGRES_DB
          value: webapp
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
          subPath: postgres

        - name: init-db
          mountPath: /docker-entrypoint-initdb.d

        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 10
          periodSeconds: 5

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            memory: "512Mi"

      volumes:
      - name: init-db
        configMap:
          name: postgres-init

  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: gp3
      resources:
        requests:
          storage: 5Gi